name: Build & Deploy to GitHub Pages

# Builds the Vite + TypeScript app on every push/PR (validation), and publishes dist/ to
# GitHub Pages only for pushes to main.
on:
  push:
    branches: [main]
    # Telemetry runs commit themselves to the repo via the Cloudflare Worker (#29). Those
    # commits touch only telemetry/** and shouldn't trigger a full rebuild + Pages deploy —
    # so a flood of runs can't burn Actions minutes or churn deploys. (Repo-side half of the
    # fix; the Worker-side move to an off-main branch is the other half.)
    paths-ignore:
      - 'telemetry/**'
  pull_request:
  workflow_dispatch:
  # Safety-net redeploy. When a PR is squash-merged via the Claude/GitHub-App token,
  # GitHub's anti-recursion guard suppresses the resulting `push` to main — so that
  # merge never fires the trigger above and the live site silently goes stale (this bit
  # v0.206 and v0.209/v0.210). Human merges and manual `workflow_dispatch` still deploy
  # immediately; this cron just guarantees main can't stay unpublished longer than the
  # interval. This repo is public, so the periodic no-op rebuilds cost no Actions minutes.
  schedule:
    - cron: '17 */3 * * *' # every 3 hours (offset :17 to dodge the top-of-hour load spike)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy from main; PR builds validate but don't publish.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
